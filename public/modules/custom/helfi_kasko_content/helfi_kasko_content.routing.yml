helfi_kasko_content.admin_form:
  path: '/admin/config/school-settings'
  defaults:
    _form: '\Drupal\helfi_kasko_content\Form\SchoolSettingsForm'
    _title: 'School settings'
  requirements:
    _permission: 'admin school settings'
  options:
    _admin_route: TRUE

helfi_kasko_content.cross_institutional_studies:
  path: '/cross-institutional-studies/{id}'
  defaults:
    _controller: '\Drupal\helfi_kasko_content\CrossInstitutionalStudies\Controller\Controller::build'
    _title_callback: '\Drupal\helfi_kasko_content\CrossInstitutionalStudies\Controller\Controller::title'
  requirements:
    _permission: 'access content'
    # FIXME forbids unauthenticated users while this feature is in development.
    _user_is_logged_in: yes

helfi_kasko_content.cross_institutional_studies_search:
  path: '/cross-institutional-studies-search'
  defaults:
    _controller: '\Drupal\helfi_kasko_content\CrossInstitutionalStudies\Controller\SearchController::content'
  requirements:
    _permission: 'access content'
